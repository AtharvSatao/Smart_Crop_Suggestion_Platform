<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact Us - Farmers Connect</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header>
        <div class="logo">
            <h1>Farmers Connect</h1>
        </div>
        <nav>
            <ul class="nav-links">
            </ul>
        </nav>
    </header>

    <div class="contact-us-container">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <label for="contact-name" class="sr-only">Your Name</label>
            <input type="text" id="contact-name" name="name" placeholder="Your Name" required>
            
            <label for="contact-email" class="sr-only">Your Email</label>
            <input type="email" id="contact-email" name="email" placeholder="Your Email" required>
            
            <label for="contact-message" class="sr-only">Your Message</label>
            <textarea id="contact-message" name="message" placeholder="Your Message" rows="5" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>

        <div class="social-follow">
            <p>Follow us on social media</p>
            <div class="social-links">
                <a href="https://www.instagram.com/yourhandle" target="_blank" class="social-link instagram">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                <a href="https://t.me/yourchannel" target="_blank" class="social-link telegram">
                    <i class="fa-brands fa-telegram"></i> Telegram
                </a>
            </div>
        </div>
    </div>

    <footer class="cr-footer">
        &copy; 2025 Farmers Connect. All rights reserved.
    </footer>
    
    <script src="script.js"></script>
    <script src="contact.js"></script>
</body>
</html>
